# buildspec-test.yml — CodeBuild: Test Stage
# -------------------------------------------------
# Place this file at the root of your application repo.
# This stage runs unit tests and a basic security audit.

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - npm ci

  pre_build:
    commands:
      - echo "Running security audit..."
      - npm audit --audit-level=high
      - echo "Audit complete."

  build:
    commands:
      - echo "Running unit tests..."
      - npm test -- --coverage --ci
      - echo "Tests passed."

reports:
  jest-results:
    files:
      - 'coverage/clover.xml'
    file-format: CLOVERXML

artifacts:
  files:
    - '**/*'
  base-directory: '.'
